<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner Taskpane</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
    }

    #appContainer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div id="appContainer">
    <iframe id="appFrame"></iframe>
  </div>

  <script>
    Office.onReady(function () {
      const baseUrl =
        "https://apps.powerapps.com/play/e/47aba3a2-60ba-e280-9473-b85f528f9e51/a/7f2e2976-0acd-4e5d-82e9-985ca51db4e6?tenantId=3fae6102-8810-4484-9c8a-dcd3c1eaea68&source=iframe";

      const frame = document.getElementById("appFrame");

      try {
        const item = Office.context.mailbox.item;

        const subject = encodeURIComponent(item && item.subject ? item.subject : "");
        const itemId = encodeURIComponent(item && item.itemId ? item.itemId : "");

        const fullUrl =
          baseUrl +
          "&subject=" + subject +
          "&itemId=" + itemId;

        console.log("Power App URL:", fullUrl);
        frame.src = fullUrl;
      } catch (error) {
        console.error("Fehler beim Laden des Outlook-Kontexts:", error);
        frame.src = baseUrl;
      }
    });
  </script>
</body>
</html>

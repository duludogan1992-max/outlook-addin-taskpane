<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planner Taskpane</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    #appContainer {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    /* 🔥 HEADER */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      background: #ffffff;
      z-index: 3;
    }

    #header img {
      width: 28px;
      height: 28px;
    }

    #header span {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    #content {
      position: relative;
      flex: 1;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #333;
      font-size: 16px;
      z-index: 2;
      text-align: center;
      padding: 16px;
      box-sizing: border-box;
      gap: 10px;
    }

    #loading img {
      width: 40px;
      height: 40px;
      opacity: 0.9;
    }

    #appFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
      display: block;
    }
  </style>
</head>

<body>
  <div id="appContainer">

    <!-- 🔥 HEADER MIT LOGO -->
    <div id="header">
      <img src="https://raw.githubusercontent.com/fabian92-at/PowerApp/main/assets/planner32.png" />
      <span>Planner Task</span>
    </div>

    <div id="content">
      <div id="loading">
        <img src="https://raw.githubusercontent.com/fabian92-at/PowerApp/main/assets/planner32.png" />
        Canvas App wird geladen...
      </div>

      <iframe
        id="appFrame"
        allow="clipboard-read; clipboard-write"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads allow-modals">
      </iframe>
    </div>

  </div>

  <script>
    const baseUrl =
      "https://apps.powerapps.com/play/e/47aba3a2-60ba-e280-9473-b85f528f9e51/a/7f2e2976-0acd-4e5d-82e9-985ca51db4e6?tenantId=3fae6102-8810-4484-9c8a-dcd3c1eaea68&source=iframe";

    function enc(v) {
      return encodeURIComponent(v || "");
    }

    function buildPowerAppUrl() {
      let subject = "";
      let itemId = "";
      let restItemId = "";
      let mailbox = "";

      try {
        if (typeof Office !== "undefined" && Office.context && Office.context.mailbox) {
          const mbx = Office.context.mailbox;
          const item = mbx.item;

          subject = enc(item?.subject || "");
          itemId = enc(item?.itemId || "");
          mailbox = enc(mbx.userProfile?.emailAddress || "");

          if (item?.itemId) {
            try {
              restItemId = enc(
                mbx.convertToRestId(
                  item.itemId,
                  Office.MailboxEnums.RestVersion.v2_0
                )
              );
            } catch (e) {
              console.warn("REST-ID konnte nicht erzeugt werden:", e);
            }
          }
        }
      } catch (e) {
        console.warn("Kein Outlook-Kontext verfügbar:", e);
      }

      return (
        baseUrl +
        "&subject=" + subject +
        "&itemId=" + itemId +
        "&restItemId=" + restItemId +
        "&mailbox=" + mailbox
      );
    }

    function loadCanvasApp() {
      const frame = document.getElementById("appFrame");
      const loading = document.getElementById("loading");

      frame.src = buildPowerAppUrl();

      frame.onload = function () {
        loading.style.display = "none";
      };
    }

    if (typeof Office !== "undefined") {
      Office.onReady(function () {
        loadCanvasApp();
      });
    } else {
      loadCanvasApp();
    }
  </script>
</body>
</html>
